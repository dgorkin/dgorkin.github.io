<!-- Default first-time visitors to dark mode. The navbar toggle still works and
     a visitor's choice persists (localStorage). Runs just after the theme init in
     gem-owned assets/js/theme.js, so a first-ever pageview may flash briefly before
     dark applies; later loads render dark immediately. Included from each page in
     _pages/; add the same include line to any new page that should default dark. -->
<script>
  (function () {
    var t = localStorage.getItem("theme");
    if (t !== "dark" && t !== "light" && t !== "system") {
      localStorage.setItem("theme", "dark");
      if (typeof applyTheme === "function") applyTheme();
    }
  })();
</script>
