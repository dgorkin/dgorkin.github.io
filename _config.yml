# -----------------------------------------------------------------------------
# Pages
# -----------------------------------------------------------------------------
collections:
  people:
    output: false

# News collection intentionally disabled — historical posts are preserved
# under _archive/news_2021-2026/ but are not built into the site.
# To re-enable, restore _news/ and add a news collection block here.

selected_papers: true

# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------
bib_search: true
filtered_bibtex_keywords: [abbr, abstract, arxiv, bibtex_show, html, pdf,
                          selected, supp, blog, code, poster, slides, website,
                          preview, altmetric, dimensions, google_scholar_stats]

# -----------------------------------------------------------------------------
# Build
# -----------------------------------------------------------------------------
plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-imagemagick
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-link-attributes
  - jekyll-twitter-plugin
  - jekyll/tagging
  - jemoji

# Scholar/bibliography
scholar:
  last_name: Gorkin
  first_name: [Dave, David, D. U., David U.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"

